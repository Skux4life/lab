AWSTemplateFormatVersion: '2010-09-09'
Description: 'End-to-End CI/CD Pipeline Stack with Failure Alerts.'

Parameters:
  EnvironmentName:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]
    Description: Environment stage name used for resource naming prefixing.

  RepositoryName:
    Type: String
    Default: my-application-repo
    Description: The name of the existing AWS CodeCommit repository to source from.

  BranchName:
    Type: String
    Default: main
    Description: The branch name to monitor for code changes.

  DeploymentBucketName:
    Type: String
    Description: The name of the pre-existing target S3 bucket where web assets will be deployed.

Resources:
  # --- Artifact Storage ---
  PipelineArtifactBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub ${AWS::AccountId}-${AWS::Region}-${EnvironmentName}-pipeline-artifacts
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # --- Notifications ---
  PipelineAlertTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub ${EnvironmentName}-pipeline-alerts-topic

  # --- IAM Role for EventBridge to invoke CodePipeline ---
  EventBridgePipelineRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${EnvironmentName}-eventbridge-pipeline-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - events.amazonaws.com
            Action:
              - 'sts:AssumeRole'
      Policies:
        - PolicyName: ExecutePipelinePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'codepipeline:StartPipelineExecution'
                Resource: !Sub arn:aws:codepipeline:${AWS::Region}:${AWS::AccountId}:${AppDeliveryPipeline}

  # --- EventBridge Rule catching CodeCommit Pushes ---
  CodeCommitSourceTriggerRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub ${EnvironmentName}-codecommit-trigger-rule
      Description: Triggers CodePipeline when changes are pushed to CodeCommit
      EventPattern:
        source:
          - aws.codecommit
        detail-type:
          - CodeCommit Repository State Change
        detail:
          event:
            - referenceCreated
            - referenceUpdated
          repositoryName:
            - !Ref RepositoryName
          referenceName:
            - !Ref BranchName
      Targets:
        - Arn: !Sub arn:aws:codepipeline:${AWS::Region}:${AWS::AccountId}:${AppDeliveryPipeline}
          RoleArn: !GetAtt EventBridgePipelineRole.Arn
          Id: TargetCodePipeline

  # --- EventBridge Rule for Tracking Failures ---
  PipelineFailureRule:
    Type: AWS::Events::Rule
    Properties:
      Description: Captures failed executions of our application delivery pipeline
      EventPattern:
        source:
          - aws.codepipeline
        detail-type:
          - CodePipeline Pipeline Execution State Change
        detail:
          pipeline:
            - !Ref AppDeliveryPipeline
          state:
            - FAILED
      Targets:
        - Arn: !Ref PipelineAlertTopic
          Id: TargetSNSTopic

  # --- Security & IAM Roles ---
  PipelineExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${EnvironmentName}-codepipeline-execution-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: [codepipeline.amazonaws.com]
            Action: ['sts:AssumeRole']
      Policies:
        - PolicyName: CodePipelinePermissions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'codecommit:CancelUploadArchive'
                  - 'codecommit:GetBranch'
                  - 'codecommit:GetCommit'
                  - 'codecommit:GetUploadArchiveStatus'
                  - 'codecommit:UploadArchive'
                Resource: !Sub arn:aws:codecommit:${AWS::Region}:${AWS::AccountId}:${RepositoryName}
              - Effect: Allow
                Action:
                  - 's3:GetObject'
                  - 's3:GetObjectVersion'
                  - 's3:GetBucketVersioning'
                  - 's3:PutObject'
                Resource:
                  - !GetAtt PipelineArtifactBucket.Arn
                  - !Sub ${PipelineArtifactBucket.Arn}/*
                  - !Sub arn:aws:s3:::${DeploymentBucketName}
                  - !Sub arn:aws:s3:::${DeploymentBucketName}/*
              - Effect: Allow
                Action:
                  - 'codebuild:BatchGetBuilds'
                  - 'codebuild:StartBuild'
                Resource: !GetAtt CodeBuildProject.Arn

  CodeBuildExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${EnvironmentName}-codebuild-execution-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: [codebuild.amazonaws.com]
            Action: ['sts:AssumeRole']
      Policies:
        - PolicyName: CodeBuildPermissions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'logs:CreateLogGroup'
                  - 'logs:CreateLogStream'
                  - 'logs:PutLogEvents'
                Resource: !Sub arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/codebuild/*
              - Effect: Allow
                Action:
                  - 's3:GetObject'
                  - 's3:GetObjectVersion'
                  - 's3:PutObject'
                Resource:
                  - !GetAtt PipelineArtifactBucket.Arn
                  - !Sub ${PipelineArtifactBucket.Arn}/*

  # --- Build Project ---
  CodeBuildProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: !Sub ${EnvironmentName}-app-build-project
      Description: Compiles, lints, and runs tests for the application.
      ServiceRole: !GetAtt CodeBuildExecutionRole.Arn
      Artifacts:
        Type: CODEPIPELINE
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_SMALL
        Image: aws/codebuild/amazonlinux2-x86_64-standard:5.0
      Source:
        Type: CODEPIPELINE
        BuildSpec: |
          version: 0.2
          phases:
            install:
              runtime-versions:
                nodejs: 18
            pre_build:
              commands:
                - echo "Running linter and unit tests..."
                - npm install
                - npm test
            build:
              commands:
                - echo "Compiling production static assets..."
                - npm run build
          artifacts:
            base-directory: dist
            files:
              - '**/*'

  # --- Pipeline Architecture ---
  AppDeliveryPipeline:
    Type: AWS::CodePipeline::Pipeline
    Properties:
      Name: !Sub ${EnvironmentName}-application-pipeline
      RoleArn: !GetAtt PipelineExecutionRole.Arn
      ArtifactStore:
        Type: S3
        Location: !Ref PipelineArtifactBucket
      Stages:
        - Name: Source
          Actions:
            - Name: SourceAction
              ActionTypeId:
                Category: Source
                Owner: AWS
                Provider: CodeCommit
                Version: '1'
              Configuration:
                RepositoryName: !Ref RepositoryName
                BranchName: !Ref BranchName
                PollForSourceChanges: 'false'  # Best Practice: Use EventBridge rules instead of polling!
              OutputArtifacts:
                - Name: SourceArtifact
              RunOrder: 1

        - Name: Build
          Actions:
            - Name: BuildAndTest
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: '1'
              Configuration:
                ProjectName: !Ref CodeBuildProject
              InputArtifacts:
                - Name: SourceArtifact
              OutputArtifacts:
                - Name: BuiltArtifact
              RunOrder: 1

        - Name: Deploy
          Actions:
            - Name: StaticAssetDeployment
              ActionTypeId:
                Category: Deploy
                Owner: AWS
                Provider: S3
                Version: '1'
              Configuration:
                BucketName: !Ref DeploymentBucketName
                Extract: 'true'
              InputArtifacts:
                - Name: BuiltArtifact
              RunOrder: 1

Outputs:
  PipelineUrl:
    Description: The console URL of the created deployment pipeline
    Value: !Sub https://${AWS::Region}.console.aws.amazon.com/codesuite/codepipeline/pipelines/${AppDeliveryPipeline}/view
